# .github/workflows/update_data.yml

name: Update Video Data Files and Push to Mania JSON

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: write # For the primary repo

jobs:
  update-and-push:
    runs-on: ubuntu-latest

    steps:
      # === Steps for the primary repository (e.g., Mania_DB) ===
      - name: Check out primary repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data update script
        run: python scraper.py

      - name: Commit and push changes (Primary Repo)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated update of video data files (primary repo)"
          file_pattern: "*.json" # Only json files in root
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
        # This action should handle "nothing to commit" gracefully for the primary repo

      # === Steps for the secondary repository (mania_json) ===
      - name: Check out mania_json repository
        uses: actions/checkout@v4
        with:
          repository: Sheikh9822/mania_json
          token: ${{ secrets.MANIA_JSON_PAT }}
          path: mania_json_repo
          # *** Ensure 'main' is the correct branch name for mania_json ***
          ref: main

      - name: Copy JSON files to mania_json checkout
        run: |
          echo "Looking for JSON files in the primary repo root: $(pwd)"
          echo "Copying JSON files to mania_json checkout directory..."
          find . -maxdepth 1 -name '*.json' -exec cp -v {} mania_json_repo/ \;
          echo "Copy complete. Contents of mania_json_repo:"
          ls -l mania_json_repo/

      # Step 7.5: Check specifically if JSON files changed in mania_json repo
      - name: Check for JSON changes in mania_json repo
        id: check_json_changes # Give the step an ID to reference its output
        working-directory: ./mania_json_repo # Run commands inside the checked-out repo
        run: |
          # Add all JSON files. Use || true to prevent error if no *.json files exist
          git add *.json || true

          # Check if there are any staged changes
          # git diff --staged --quiet exits 0 if no changes, 1 if changes
          if git diff --staged --quiet; then
            echo "No JSON changes detected in mania_json_repo."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "JSON changes detected in mania_json_repo."
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      # Step 8: Commit and push changes ONLY IF changes were detected in Step 7.5
      - name: Commit and push changes (mania_json Repo)
        # Only run this step if the previous step detected changes
        if: steps.check_json_changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated update of video data files"
          repository: mania_json_repo # Operate within this directory
          # *** Ensure 'main' is the correct branch name ***
          branch: main
          # The 'add' was already done in the previous step, but file_pattern here
          # helps confirm *what* should be committed if the action were doing the add.
          # It might be redundant now but doesn't hurt.
          file_pattern: "*.json"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          # Removed invalid 'skip_tag'. Keep 'skip_dirty_check' if needed, but
          # the explicit check might make it less necessary. It's a valid input.
          skip_dirty_check: true
