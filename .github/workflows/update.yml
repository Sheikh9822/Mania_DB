# .github/workflows/update_data.yml (or your chosen filename)

name: Update Video Data Files and Push to Mania JSON

# Controls when the workflow will run
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Runs the workflow automatically every 5 minutes
  schedule:
    - cron: '*/5 * * * *'

# Sets permissions for the GITHUB_TOKEN for the primary repository
permissions:
  contents: write # Required to checkout code and commit/push changes to the *current* (primary) repo

jobs:
  update-and-push:
    runs-on: ubuntu-latest

    steps:
      # === Steps for the primary repository (e.g., Mania_DB) ===

      # Step 1: Check out the primary repository code
      - name: Check out primary repository
        uses: actions/checkout@v4
        # Checks out the repo where this workflow file lives

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Or your required Python version
          cache: 'pip'

      # Step 3: Install Python dependencies from requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run the Python script to update JSON files in the workspace
      # Assumes scraper.py generates/updates *.json files in the root directory
      - name: Run data update script
        run: python scraper.py

      # Step 5: Commit and push changes to the primary repository
      # Note: If scraper.py doesn't change any *.json files, this step will report
      # "Working tree clean. Nothing to commit.", which is normal in that case.
      - name: Commit and push changes (Primary Repo)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated update of video data files (primary repo)"
          # Only commit changes to .json files in the root of the primary repo checkout
          file_pattern: "*.json"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          # Pushes to the branch the workflow is running on in the primary repo

      # === Steps for the secondary repository (mania_json) ===

      # Step 6: Check out the mania_json repository
      - name: Check out mania_json repository
        uses: actions/checkout@v4
        with:
          # The repository to check out
          repository: Sheikh9822/mania_json
          # Use the PAT secret for authentication
          token: ${{ secrets.MANIA_JSON_PAT }}
          # Checkout into a specific subdirectory to avoid conflicts
          path: mania_json_repo
          # *** CRITICAL FIX: Assuming the branch is 'main'. Verify this! ***
          # Replace 'main' below if your branch in mania_json has a different name.
          # Also ensure this branch is NOT empty (has at least one commit).
          ref: main

      # Step 7: Copy updated JSON files to the mania_json checkout directory
      - name: Copy JSON files to mania_json checkout
        run: |
          echo "Looking for JSON files in the primary repo root: $(pwd)"
          echo "Copying JSON files to mania_json checkout directory..."
          # Find JSON files only in the root of the primary checkout (.) and copy them
          # Safely handles cases where no JSON files were generated/modified
          find . -maxdepth 1 -name '*.json' -exec cp -v {} mania_json_repo/ \;
          echo "Copy complete. Contents of mania_json_repo:"
          ls -l mania_json_repo/

      # Step 8: Commit and push changes to the mania_json repository
      - name: Commit and push changes (mania_json Repo)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated update of video data files"
          # Tell the action to work inside the mania_json_repo subdirectory
          repository: mania_json_repo
          # *** CRITICAL FIX: Use the same branch name specified in Step 6 ('ref') ***
          # Replace 'main' below if your branch in mania_json has a different name.
          branch: main
          # Only commit .json files within the mania_json_repo directory
          file_pattern: "*.json"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          # Options often helpful when working in a subdirectory checkout
          skip_tag: true
          skip_dirty_check: true
